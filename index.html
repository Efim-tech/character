<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚔️ ХРОНИКИ ГЕРОЯ ⚔️</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       СОВРЕМЕННЫЙ ФЭНТЕЗИ-ДИЗАЙН С НУЛЯ
       ============================================ */
    :root {
      --gold: #ffd700;
      --gold-dim: #b8860b;
      --gold-glow: rgba(255, 215, 0, 0.5);
      --blood: #8b0000;
      --blood-light: #ff4444;
      --sapphire: #0a1930;
      --sapphire-light: #1a3a5c;
      --emerald: #0a3020;
      --amethyst: #2a1030;
      --parchment: #f0e6d2;
      --parchment-dark: #8b7355;
      --shadow: #0a0a0f;
      
      /* НОВАЯ ЦВЕТОВАЯ ГАММА */
      --nav-active-bg: linear-gradient(135deg, #2a1a3a 0%, #1a2a4a 100%);
      --nav-active-border: #7b68ee;
      --nav-active-text: #e0d5ff;
      --nav-active-glow: rgba(123, 104, 238, 0.5);
      --nav-inactive-text: #8899bb;
      --nav-bg: rgba(15, 25, 40, 0.7);
      
      --glass-bg: rgba(10, 20, 30, 0.7);
      --glass-border: rgba(123, 104, 238, 0.25);
      --glass-highlight: rgba(255, 255, 255, 0.05);
      
      --card-radius: 24px;
      --card-padding: 18px;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Manrope', sans-serif;
      background: #0a0f18;
      min-height: 100vh;
      color: var(--parchment);
      overflow-x: hidden;
      position: relative;
    }
    
    /* ===== ЭПИЧЕСКИЙ ФОН ===== */
    .background-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    
    .bg-sky {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 30% 20%, #1a2a4a 0%, #0a1220 50%, #050a10 100%);
    }
    
    .bg-stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(2px 2px at 15% 25%, rgba(255, 255, 255, 0.9), transparent),
        radial-gradient(1px 1px at 35% 45%, rgba(255, 255, 255, 0.7), transparent),
        radial-gradient(2px 2px at 55% 15%, rgba(255, 255, 255, 0.8), transparent),
        radial-gradient(1px 1px at 75% 35%, rgba(255, 255, 255, 0.6), transparent),
        radial-gradient(3px 3px at 85% 65%, rgba(255, 255, 255, 0.9), transparent),
        radial-gradient(1px 1px at 10% 75%, rgba(255, 255, 255, 0.7), transparent),
        radial-gradient(2px 2px at 45% 85%, rgba(255, 255, 255, 0.8), transparent),
        radial-gradient(1px 1px at 95% 15%, rgba(255, 255, 255, 0.6), transparent);
      animation: twinkle 4s infinite alternate;
    }
    
    @keyframes twinkle {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    
    .bg-nebula {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 150, 200, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 100, 50, 0.08) 0%, transparent 60%);
      filter: blur(40px);
      animation: nebulaFlow 30s infinite alternate ease-in-out;
    }
    
    @keyframes nebulaFlow {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-2%, 1%) scale(1.05); }
      66% { transform: translate(1%, -2%) scale(1.02); }
      100% { transform: translate(2%, 2%) scale(1.08); }
    }
    
    .bg-mountains {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(0deg, 
        #0a1220 0%,
        #0d1a2a 20%,
        #111e30 40%,
        transparent 100%);
      clip-path: polygon(0% 100%, 0% 60%, 8% 45%, 15% 55%, 22% 35%, 30% 50%, 
                         38% 30%, 45% 48%, 52% 25%, 60% 42%, 68% 20%, 75% 38%, 
                         82% 28%, 90% 45%, 95% 35%, 100% 50%, 100% 100%);
    }
    
    .bg-mountains::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(0deg, 
        #060a12 0%,
        #0a1220 30%,
        transparent 100%);
      clip-path: polygon(0% 100%, 0% 75%, 10% 60%, 20% 70%, 30% 55%, 40% 65%, 
                         50% 45%, 60% 60%, 70% 40%, 80% 55%, 90% 48%, 100% 65%, 100% 100%);
    }
    
    /* ===== ОСНОВНОЙ КОНТЕЙНЕР ===== */
    .app-container {
      position: relative;
      z-index: 10;
      max-width: 420px;
      margin: 0 auto;
      padding: 12px 14px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 8px 0;
    }
    
    .hero-identity {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .hero-avatar {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #7b68ee, #9370db);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(123, 104, 238, 0.3), 0 0 20px rgba(123, 104, 238, 0.4);
      position: relative;
      overflow: hidden;
    }
    
    .hero-avatar::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: avatarShine 4s infinite;
    }
    
    @keyframes avatarShine {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      25% { transform: translateX(100%) translateY(100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }
    
    .hero-info h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--parchment), #e0d5ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 2px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }
    
    .hero-info p {
      font-size: 0.7rem;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    /* Кошелёк */
    .wallet-display {
      background: linear-gradient(135deg, rgba(123, 104, 238, 0.2), rgba(147, 112, 219, 0.1));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 10px 16px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(123, 104, 238, 0.3);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }
    
    .wallet-display::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(123, 104, 238, 0.2), transparent);
      animation: walletShine 5s infinite;
    }
    
    @keyframes walletShine {
      0%, 100% { left: -100%; }
      50% { left: 100%; }
    }
    
    .wallet-icon {
      font-size: 1.3rem;
      filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.5));
    }
    
    #wallet-value {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #e0d5ff;
      text-shadow: 0 0 15px rgba(123, 104, 238, 0.5);
      min-width: 60px;
      text-align: right;
    }
    
    /* ===== НАВИГАЦИЯ ===== */
    .nav-pills {
      display: flex;
      justify-content: space-around;
      gap: 4px;
      margin-bottom: 20px;
      background: var(--nav-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 8px 6px;
      border-radius: 60px;
      border: 1px solid rgba(123, 104, 238, 0.2);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    
    .nav-pill {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      border: none;
      background: transparent;
      color: var(--nav-inactive-text);
      font-family: 'Manrope', sans-serif;
      font-weight: 500;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      gap: 4px;
    }
    
    .nav-pill .nav-icon {
      font-size: 1.2rem;
      margin-bottom: 2px;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
      transition: transform 0.3s ease;
    }
    
    .nav-pill .nav-label {
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    
    .nav-pill.active {
      background: var(--nav-active-bg);
      color: var(--nav-active-text);
      text-shadow: 0 0 10px var(--nav-active-glow);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 4px 12px rgba(0, 0, 0, 0.3), 0 0 15px var(--nav-active-glow);
      border: 1px solid var(--nav-active-border);
    }
    
    .nav-pill.active .nav-icon {
      transform: scale(1.1);
      filter: drop-shadow(0 0 8px var(--nav-active-glow));
    }
    
    .nav-pill::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, rgba(123, 104, 238, 0.2) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    
    .nav-pill:hover::before {
      opacity: 1;
    }
    
    .nav-pill:hover {
      color: var(--nav-active-text);
    }
    
    /* ===== КОНТЕНТНЫЕ СЕКЦИИ ===== */
    .content-section {
      display: none;
      flex: 1;
      animation: fadeSlide 0.4s ease;
    }
    
    .content-section.active {
      display: block;
    }
    
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* ===== КАРТОЧКИ ===== */
    .stats-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    
    .vital-card {
      background: linear-gradient(145deg, rgba(10, 25, 35, 0.8), rgba(5, 15, 25, 0.9));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 20px var(--card-padding);
      border: 1px solid rgba(123, 104, 238, 0.2);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }
    
    .vital-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #7b68ee, transparent);
      opacity: 0.5;
    }
    
    .vital-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .vital-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--parchment);
    }
    
    .vital-icon {
      font-size: 1.3rem;
    }
    
    .vital-value {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #e0d5ff;
      text-shadow: 0 0 15px rgba(123, 104, 238, 0.4);
    }
    
    /* Прогресс-бары */
    .progress-bar-container {
      position: relative;
      height: 28px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 40px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.5);
    }
    
    .progress-fill {
      height: 100%;
      border-radius: 40px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      animation: barShine 2.5s infinite;
    }
    
    @keyframes barShine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    
    .hp-fill {
      background: linear-gradient(90deg, #8b0000, #dc143c, #ff4444);
      box-shadow: 0 0 20px rgba(220, 20, 60, 0.6);
    }
    
    .energy-fill {
      background: linear-gradient(90deg, #1a3a5c, #3498db, #5dade2);
      box-shadow: 0 0 20px rgba(52, 152, 219, 0.6);
    }
    
    .armor-fill {
      background: linear-gradient(90deg, #2c3e50, #7f8c8d, #bdc3c7);
      box-shadow: 0 0 20px rgba(189, 195, 199, 0.5);
    }
    
    .crystal-fill {
      background: linear-gradient(90deg, #4a235a, #8e44ad, #d2b4de);
      box-shadow: 0 0 25px rgba(155, 89, 182, 0.8);
      animation: crystalPulse 2.5s infinite;
    }
    
    @keyframes crystalPulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }
    
    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.75rem;
      font-weight: 700;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.8);
      color: white;
      z-index: 2;
      white-space: nowrap;
    }
    
    /* Сетка статов */
    .stats-grid-3 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    
    .stat-tile {
      background: linear-gradient(145deg, rgba(10, 25, 35, 0.7), rgba(5, 15, 25, 0.8));
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 22px;
      padding: 16px 12px;
      border: 1px solid rgba(123, 104, 238, 0.15);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }
    
    .stat-tile:hover {
      transform: translateY(-2px);
      border-color: rgba(123, 104, 238, 0.4);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4), 0 0 20px rgba(123, 104, 238, 0.15);
    }
    
    .stat-tile .icon {
      font-size: 1.8rem;
      margin-bottom: 6px;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.4));
    }
    
    .stat-tile .value {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #e0d5ff;
      text-shadow: 0 0 15px rgba(123, 104, 238, 0.4);
      line-height: 1.2;
    }
    
    .stat-tile .label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.7;
      margin-top: 4px;
    }
    
    /* XP Bar */
    .xp-container {
      margin-top: 8px;
    }
    
    .xp-bar-small {
      height: 8px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      overflow: hidden;
      margin: 8px 0 4px;
      border: 1px solid rgba(123, 104, 238, 0.2);
    }
    
    .xp-fill-small {
      height: 100%;
      background: linear-gradient(90deg, #7b68ee, #9370db, #b8a2ff);
      border-radius: 10px;
      box-shadow: 0 0 10px #7b68ee;
    }
    
    /* Оружие */
    .weapon-showcase {
      background: linear-gradient(145deg, rgba(20, 40, 50, 0.8), rgba(10, 20, 30, 0.9));
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 18px var(--card-padding);
      border: 1px solid rgba(123, 104, 238, 0.25);
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 5px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    }
    
    .weapon-icon {
      font-size: 2.5rem;
      filter: drop-shadow(0 0 15px rgba(123, 104, 238, 0.4));
    }
    
    .weapon-details {
      flex: 1;
    }
    
    .weapon-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.6;
    }
    
    #weapon-value-new {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--parchment);
    }
    
    /* Статус */
    .status-indicator {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 10px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .status-alive {
      color: #2ecc71;
      text-shadow: 0 0 10px #2ecc71;
      border-color: #2ecc71;
    }
    
    .status-dead {
      color: #ff4444;
      text-shadow: 0 0 10px #ff4444;
      border-color: #ff4444;
    }
    
    /* ===== ИНВЕНТАРЬ ===== */
    .inventory-header-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      padding: 12px 16px;
      background: rgba(10, 25, 35, 0.5);
      backdrop-filter: blur(15px);
      border-radius: 40px;
      border: 1px solid rgba(123, 104, 238, 0.15);
    }
    
    .inventory-grid-new {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    
    .item-card {
      background: linear-gradient(145deg, rgba(15, 30, 40, 0.9), rgba(8, 18, 28, 0.95));
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 16px 10px;
      border: 1px solid rgba(123, 104, 238, 0.2);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      transition: all 0.25s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      text-align: center;
    }
    
    .item-card:hover {
      transform: translateY(-3px);
      border-color: #7b68ee;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(123, 104, 238, 0.3);
    }
    
    .item-card.equipped {
      border: 2px solid #2ecc71;
      box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
    }
    
    .item-card.equipped::after {
      content: '⚔️';
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: 0.8rem;
      background: #2ecc71;
      padding: 3px 6px;
      border-radius: 30px;
      color: white;
      font-weight: bold;
    }
    
    .item-icon-large {
      font-size: 2.8rem;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
    }
    
    .item-name {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 0.85rem;
      color: #e0d5ff;
      margin-bottom: 4px;
    }
    
    .item-desc {
      font-size: 0.65rem;
      opacity: 0.7;
      margin-bottom: 10px;
    }
    
    .item-footer-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 8px;
      border-top: 1px solid rgba(123, 104, 238, 0.2);
    }
    
    .item-quantity-badge {
      background: #7b68ee;
      padding: 3px 10px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      color: white;
    }
    
    /* ===== МАГАЗИН ===== */
    .shop-category {
      margin-bottom: 24px;
    }
    
    .shop-category-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      color: #e0d5ff;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.9rem;

  <script>
    // ==================== КОНСТАНТЫ И НАСТРОЙКИ ====================
    const API_BASE_URL = 'https://gmbtg-efich.amvera.io';
    const PAYMENT_API_URL = 'https://gmbtest-efich.amvera.io';
    const SUBSCRIPTIONS = [
      { id: 'sub_adventurer', name: '🧭 Авантюрист', price: 1, features: ['+1 большое зелье энергии', '+50 серебряных монет'] },
      { id: 'sub_hero', name: '⚔️ Герой', price: 1, features: ['+2 больших зелья энергии', '+100 серебряных монет', '+1 бинт'] },
      { id: 'sub_champion', name: '👑 Чемпион', price: 1, features: ['+3 больших зелья энергии', '+200 серебряных монет', '+1 бинт', '+1 ремонтный набор'] },
      { id: 'sub_legend', name: '🌟 Легенда', price: 1, features: ['+5 больших зелий энергии', '+300 серебряных монет', '+1 зелье здоровья', '+1 ремонтный набор'] },
      { id: 'sub_crystal_novice', name: '🔮 Послушник', price: 1, features: ['+5 зарядов кристалла', '+1 большое зелье энергии', '+150 серебряных монет', '+2 бинта'] },
      { id: 'sub_crystal_master', name: '💎 Мастер', price: 1, features: ['+15 зарядов кристалла', '+2 больших зелья энергии', '+250 серебряных монет', '+2 зелья здоровья', '+2 ремнабора'] },
      { id: 'sub_crystal_archon', name: '✨ Архонт', price: 1, features: ['+25 зарядов кристалла', '+3 больших зелья энергии', '+500 серебряных монет', '+3 зелья здоровья', '+3 ремнабора'] }
    ];
  
    // ==================== ИНИЦИАЛИЗАЦИЯ TELEGRAM ====================
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.BackButton.hide();
    tg.enableClosingConfirmation();
    
    // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
    let characterData = {};
    let activeSubscription = null;
    let updateInterval = null;
    let coinsCheckInterval = null;
    let lastDeathCheckTime = 0;
    let previousHP = 0;
    let previousArmor = 0;
    const DEATH_CHECK_COOLDOWN = 5000;
  
    // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
    function getChatId() {
      const urlParams = new URLSearchParams(window.location.search);
      const startappParam = urlParams.get('startapp');
      if (startappParam) return startappParam;
      if (tg.initDataUnsafe && tg.initDataUnsafe.user) return tg.initDataUnsafe.user.id;
      if (tg.initDataUnsafe && tg.initDataUnsafe.start_param) return tg.initDataUnsafe.start_param;
      return null;
    }
  
    function showLoading(show) {
      const loader = document.getElementById('loading-message-new');
      if (loader) loader.style.display = show ? 'block' : 'none';
    }
  
    function showError(message) {
      const errorEl = document.getElementById('error-message-new');
      if (errorEl) {
        errorEl.innerHTML = `❌ ${message}`;
        errorEl.style.display = 'block';
      }
    }
  
    function hideError() {
      const errorEl = document.getElementById('error-message-new');
      if (errorEl) errorEl.style.display = 'none';
    }
  
    function getItemIcon(item) {
      if (item.name) {
        if (item.name.includes('Большое')) return '🧴';
        if (item.name.includes('Среднее')) return '⚗️';
        if (item.name.includes('Маленькое')) return '🧪';
        if (item.name.includes('Бинт')) return '🩹';
        if (item.name.includes('Ремонтный')) return '🔧';
        if (item.name.includes('Зелье здоровья')) return '🧪';
      }
      const icons = {
        'weapon': '⚔️', 'armor': '🛡️', 'potion': '🧪', 'medical': '🩹',
        'repair': '🔧', 'amulet': '📿', 'scroll': '📜', 'food': '🍖',
        'key': '🔑', 'gem': '💎', 'ammo': '🏹', 'currency': '💰'
      };
      return icons[item.type] || '📦';
    }
  
    function getItemTypeName(itemType) {
      const names = {
        'weapon': 'Оружие', 'armor': 'Броня', 'potion': 'Зелье',
        'medical': 'Медицина', 'repair': 'Ремонт', 'amulet': 'Амулет',
        'scroll': 'Свиток', 'food': 'Еда', 'key': 'Ключ',
        'gem': 'Самоцвет', 'ammo': 'Боеприпас', 'currency': 'Монеты'
      };
      return names[itemType] || 'Предмет';
    }
  
    // ==================== АНИМАЦИИ УРОНА ====================
    function showDamageNotification(damage) {
      const container = document.querySelector('.app-container');
      if (container) {
        container.classList.add('shake-effect');
        setTimeout(() => container.classList.remove('shake-effect'), 400);
      }
      
      const popup = document.createElement('div');
      popup.className = 'damage-popup';
      popup.textContent = `-${damage} ❤️`;
      document.body.appendChild(popup);
      
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      
      setTimeout(() => popup.remove(), 1200);
    }
  
    function showArmorDamageNotification(damage) {
      const popup = document.createElement('div');
      popup.className = 'damage-popup armor-popup';
      popup.textContent = `-${damage} 🛡️`;
      document.body.appendChild(popup);
      setTimeout(() => popup.remove(), 1200);
    }
  
    // ==================== ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ====================
    function updateUI() {
      if (!characterData) return;
      
      const cd = characterData;
      
      // Имя и уровень в хедере
      document.getElementById('character-name-display').textContent = cd.name || 'Безымянный герой';
      document.getElementById('level-title-display').textContent = `${cd.level_title || 'Наемник'} ${cd.level || 1} ур.`;
      
      // Кошелёк
      const walletEl = document.getElementById('wallet-value');
      if (walletEl) {
        walletEl.textContent = cd.coins || 0;
        if (cd.coins < 100) walletEl.style.color = '#ff6b6b';
        else if (cd.coins < 500) walletEl.style.color = '#ffd700';
        else walletEl.style.color = '#daa520';
      }
      
      // Проверка на получение урона
      if (previousHP > cd.hp) {
        showDamageNotification(previousHP - cd.hp);
      }
      if (previousArmor > cd.armor) {
        showArmorDamageNotification(previousArmor - cd.armor);
      }
      previousHP = cd.hp;
      previousArmor = cd.armor;
      
      // HP
      const hpPercent = cd.max_hp > 0 ? (cd.hp / cd.max_hp) * 100 : 0;
      document.getElementById('hp-value-display').textContent = `${cd.hp}/${cd.max_hp}`;
      document.getElementById('health-fill-new').style.width = `${hpPercent}%`;
      document.getElementById('health-text-new').textContent = `${cd.hp}/${cd.max_hp}`;
      
      // Energy
      const energyCurrent = cd.energy?.current || 0;
      const energyMax = cd.energy?.max || 0;
      const energyPercent = energyMax > 0 ? (energyCurrent / energyMax) * 100 : 0;
      document.getElementById('energy-value-display').textContent = `${energyCurrent}/${energyMax}`;
      document.getElementById('energy-fill-new').style.width = `${energyPercent}%`;
      document.getElementById('energy-text-new').textContent = `${energyCurrent}/${energyMax}`;
      
      // Таймер энергии (если есть данные)
      if (cd.energy?.next_regen_at) {
        const timerEl = document.getElementById('energy-timer-new');
        const timerValueEl = document.getElementById('timer-value-new');
        if (timerEl && timerValueEl) {
          const now = Date.now() / 1000;
          const timeLeft = Math.max(0, Math.ceil(cd.energy.next_regen_at - now));
          if (timeLeft > 0 && energyCurrent < energyMax) {
            timerEl.style.display = 'block';
            timerValueEl.textContent = timeLeft;
            if (timeLeft <= 30) timerEl.classList.add('warning');
            else timerEl.classList.remove('warning');
          } else {
            timerEl.style.display = 'none';
          }
        }
      } else {
        const timerEl = document.getElementById('energy-timer-new');
        if (timerEl) timerEl.style.display = 'none';
      }
      
      // Armor
      const armorPercent = cd.max_armor > 0 ? (cd.armor / cd.max_armor) * 100 : 0;
      document.getElementById('armor-value-display').textContent = cd.armor || 0;
      document.getElementById('armor-fill-new').style.width = `${armorPercent}%`;
      document.getElementById('armor-text-new').textContent = cd.armor || 0;
      
      // Level & XP
      const level = cd.level || 1;
      const xp = cd.xp || 0;
      const xpToNext = cd.xp_to_next || 100;
      const xpPercent = xpToNext > 0 ? (xp / xpToNext) * 100 : 0;
      document.getElementById('level-value-new').textContent = level;
      document.getElementById('xp-fill-new').style.width = `${xpPercent}%`;
      document.getElementById('xp-text-new').textContent = `${xp}/${xpToNext} XP`;
      
      // Crystal
      const crystalsCurrent = cd.visual_energy?.current || 0;
      const crystalsMax = cd.visual_energy?.max || 50;
      const crystalsPercent = crystalsMax > 0 ? (crystalsCurrent / crystalsMax) * 100 : 0;
      document.getElementById('crystal-value-new').textContent = `${crystalsCurrent}/${crystalsMax}`;
      document.getElementById('crystal-fill-new').style.width = `${crystalsPercent}%`;
      
      // Weapon
      document.getElementById('weapon-value-new').textContent = cd.weapon || 'Нет';
      
      // Status
      const statusEl = document.getElementById('status-value-new');
      if (cd.hp <= 0 || !cd.is_alive || cd.is_dead) {
        statusEl.textContent = 'МЁРТВ';
        statusEl.className = 'status-indicator status-dead';
      } else {
        statusEl.textContent = 'ЖИВ';
        statusEl.className = 'status-indicator status-alive';
      }
      
      // Обновляем инвентарь
      updateInventory();
      
      // Проверка на смерть
      if (cd.hp <= 0 && !cd.is_dead && !window.deathCheckScheduled) {
        window.deathCheckScheduled = true;
        setTimeout(() => {
          checkDeathOnHPChange();
          window.deathCheckScheduled = false;
        }, 1000);
      }
    }
  
    // ==================== ИНВЕНТАРЬ ====================
    function updateInventory() {
      const grid = document.getElementById('inventory-grid-new');
      const emptyMsg = document.getElementById('inventory-empty-new');
      const stats = document.getElementById('inventory-stats-new');
      
      if (!characterData.inventory || characterData.inventory.length === 0) {
        if (grid) grid.innerHTML = '';
        if (emptyMsg) emptyMsg.style.display = 'block';
        if (stats) stats.textContent = '0 предметов';
        return;
      }
      
      if (emptyMsg) emptyMsg.style.display = 'none';
      if (grid) grid.innerHTML = '';
      
      const sorted = [...characterData.inventory].sort((a, b) => {
        if (a.is_equipped && !b.is_equipped) return -1;
        if (!a.is_equipped && b.is_equipped) return 1;
        return (a.name || '').localeCompare(b.name || '');
      });
      
      sorted.forEach(item => {
        const card = document.createElement('div');
        card.className = `item-card ${item.is_equipped ? 'equipped' : ''}`;
        
        const icon = getItemIcon(item);
        const typeName = getItemTypeName(item.type);
        
        card.innerHTML = `
          <div class="item-icon-large">${icon}</div>
          <div class="item-name">${item.name || 'Предмет'}</div>
          <div class="item-desc">${item.description || 'Обычный предмет'}</div>
          <div class="item-footer-card">
            <span class="item-quantity-badge">x${item.quantity || 1}</span>
            <span style="font-size: 0.65rem; opacity: 0.7;">${typeName}</span>
          </div>
        `;
        
        card.addEventListener('click', () => showItemDetails(item));
        grid.appendChild(card);
      });
      
      if (stats) {
        const totalItems = sorted.reduce((sum, item) => sum + (item.quantity || 1), 0);
        stats.textContent = `${sorted.length} предметов (${totalItems} шт.)`;
      }
    }
  
    function showItemDetails(item) {
      let buttons = [];
      
      if (item.type === 'potion' || item.type === 'medical' || item.type === 'repair' || item.type === 'consumable') {
        buttons.push({ type: 'default', text: '🧪 Использовать', id: 'use' });
      }
      buttons.push({ type: 'cancel', text: 'Закрыть' });
      
      let message = `${item.description || 'Описание отсутствует'}\n\nТип: ${getItemTypeName(item.type)}\nКоличество: ${item.quantity || 1}`;
      
      if (item.effects) {
        if (item.effects.hp) message += `\n❤️ Восстановит HP: +${item.effects.hp}`;
        if (item.effects.energy) message += `\n⚡ Восстановит энергии: +${item.effects.energy}`;
        if (item.effects.armor) message += `\n🛡️ Восстановит брони: +${item.effects.armor}`;
        if (item.effects.visual_energy) message += `\n🔮 Восстановит зарядов кристалла: +${item.effects.visual_energy}`;
      }
      
      tg.showPopup({
        title: item.name || 'Предмет',
        message: message,
        buttons: buttons
      }, (buttonId) => {
        if (buttonId === 'use') useItem(item.name);
      });
    }
  
    async function useItem(itemName) {
      try {
        const chatId = getChatId();
        if (!chatId) {
          tg.showPopup({ title: 'Ошибка', message: 'Не удалось определить пользователя', buttons: [{ type: 'cancel' }] });
          return;
        }
        
        const response = await fetch(`${API_BASE_URL}/api/character/${chatId}/use_item`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ item_name: itemName })
        });
        
        const data = await response.json();
        
        if (data.success) {
          tg.showPopup({ title: '✅ Успех', message: data.message, buttons: [{ type: 'cancel' }] });
          setTimeout(() => loadCharacterData(), 1000);
        } else {
          tg.showPopup({ title: '❌ Ошибка', message: data.error || 'Не удалось использовать предмет', buttons: [{ type: 'cancel' }] });
        }
      } catch (error) {
        console.error('Error using item:', error);
        tg.showPopup({ title: '❌ Ошибка', message: 'Ошибка при использовании предмета', buttons: [{ type: 'cancel' }] });
      }
    }
  
    // ==================== ЗАГРУЗКА ДАННЫХ ====================
    async function loadCharacterData() {
      try {
        showLoading(true);
        hideError();
        
        const chatId = getChatId();
        if (!chatId) throw new Error('Не удалось определить пользователя');
        
        const response = await fetch(`${API_BASE_URL}/api/character/${chatId}/full`);
        const data = await response.json();
        
        if (data.success) {
          characterData = data.data;
          updateUI();
          showLoading(false);
          
          if (characterData.hp <= 0) {
            setTimeout(() => checkDeathOnHPChange(), 1000);
          }
        } else {
          throw new Error(data.error || 'Ошибка загрузки данных');
        }
      } catch (error) {
        console.error('❌ Error loading character data:', error);
        showLoading(false);
        showError(error.message);
      }
    }
  
    // ==================== ПРОВЕРКА СМЕРТИ ====================
    async function checkDeathOnHPChange() {
      const now = Date.now();
      if (now - lastDeathCheckTime < DEATH_CHECK_COOLDOWN) return;
      lastDeathCheckTime = now;
      
      const chatId = getChatId();
      if (!chatId) return;
      
      const hpEl = document.getElementById('hp-value-display');
      if (!hpEl) return;
      
      const currentHP = parseInt(hpEl.textContent.split('/')[0]);
      
      if (currentHP <= 0) {
        const response = await fetch(`${API_BASE_URL}/api/character/${chatId}/check_death`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hp: currentHP, armor: characterData.armor || 0 })
        });
        
        const data = await response.json();
        
        if (data.success && data.death_detected) {
          showDeathInWebApp(data.character_name);
        }
      }
    }
  
    function showDeathInWebApp(characterName) {
      if (updateInterval) {
        clearInterval(updateInterval);
        updateInterval = null;
      }
      stopCoinsMonitoring();
      
      const deathMsg = document.createElement('div');
      deathMsg.className = 'error-state';
      deathMsg.style.cssText = 'background: rgba(220, 53, 69, 0.9) !important; border-color: #ff0000 !important; color: white !important;';
      deathMsg.innerHTML = `
        <h3 style="margin-bottom: 10px;">💀 ${characterName.toUpperCase()} ПАЛ В БОЮ!</h3>
        <p>Проверьте Telegram для создания нового героя</p>
      `;
      
      const container = document.querySelector('.app-container');
      if (container) container.insertBefore(deathMsg, container.firstChild);
      
      document.querySelectorAll('button, .item-card, .nav-pill').forEach(el => {
        el.style.pointerEvents = 'none';
        el.style.opacity = '0.5';
      });
      
      setTimeout(() => {
        tg.showAlert('Персонаж мертв. Проверьте Telegram для создания нового персонажа.');
        setTimeout(() => tg.close(), 3000);
      }, 10000);
    }
  
    // ==================== МОНИТОРИНГ МОНЕТ ====================
    async function checkCoinsBalance(forceUpdate = false) {
      try {
        const chatId = getChatId();
        if (!chatId) return;
        
        const response = await fetch(`${API_BASE_URL}/api/character/${chatId}/coins`);
        const data = await response.json();
        
        if (data.success) {
          const walletEl = document.getElementById('wallet-value');
          const currentCoins = parseInt(walletEl.textContent) || 0;
          
          if (forceUpdate || currentCoins !== data.coins) {
            walletEl.textContent = data.coins;
            if (characterData) characterData.coins = data.coins;
          }
        }
      } catch (error) {
        console.error('Error checking coins:', error);
      }
    }
  
    function startCoinsMonitoring() {
      coinsCheckInterval = setInterval(() => checkCoinsBalance(false), 5000);
    }
  
    function stopCoinsMonitoring() {
      if (coinsCheckInterval) {
        clearInterval(coinsCheckInterval);
        coinsCheckInterval = null;
      }
    }
  
    // ==================== МАГАЗИН ====================
    function initShop() {
      const container = document.getElementById('shop-dynamic-content');
      if (!container) return;
      if (container.children.length > 0) return;
      
      container.innerHTML = `
        <div class="shop-category">
          <div class="shop-category-title"><span>⚡</span> Зелья энергии</div>
          <div class="shop-grid-new">
            ${createShopItemHTML('energy10', '🧪', 'Малое зелье', '+10 энергии', 2)}
            ${createShopItemHTML('energy25', '⚗️', 'Среднее зелье', '+25 энергии', 4)}
            ${createShopItemHTML('energy50', '🧴', 'Большое зелье', '+50 энергии', 7)}
          </div>
        </div>
        <div class="shop-category">
          <div class="shop-category-title"><span>🔮</span> Заряды кристалла</div>
          <div class="shop-grid-new">
            ${createShopItemHTML('crystal_charge_5', '🔮', 'Малый заряд', '+5 зарядов', 3)}
            ${createShopItemHTML('crystal_charge_10', '🔮🔮', 'Средний заряд', '+10 зарядов', 5)}
            ${createShopItemHTML('crystal_charge_25', '🔮🔮🔮', 'Большой заряд', '+25 зарядов', 10)}
            ${createShopItemHTML('crystal_charge_50', '💎', 'Огромный заряд', '+50 зарядов', 18)}
          </div>
        </div>
        <div class="shop-category">
          <div class="shop-category-title"><span>💰</span> Серебряные монеты</div>
          <div class="shop-grid-new">
            ${createShopItemHTML('coins500', '💰', '500 монет', '', 10)}
            ${createShopItemHTML('coins1000', '💰💰', '1000 монет', '', 18)}
            ${createShopItemHTML('coins2500', '💰💰💰', '2500 монет', '', 40)}
            ${createShopItemHTML('coins5000', '💎', '5000 монет', '', 75)}
            ${createShopItemHTML('coins10000', '👑', '10000 монет', '', 140)}
          </div>
        </div>
        <div class="shop-category">
          <div class="shop-category-title"><span>🩹</span> Лечение и ремонт</div>
          <div class="shop-grid-new">
            ${createShopItemHTML('bandage', '🩹', 'Бинт', '+5 HP', 4)}
            ${createShopItemHTML('health_potion', '🧪', 'Зелье здоровья', '+10 HP', 6)}
            ${createShopItemHTML('repair_kit', '🔧', 'Ремнабор', '+5 брони', 6)}
          </div>
        </div>
        <div class="shop-category">
          <div class="shop-category-title"><span>🎁</span> Премиум наборы</div>
          <div class="shop-grid-new">
            ${createShopItemHTML('traveler_set', '🎒', 'Набор путника', 'Бинт + Зелье + 100💰', 15)}
            ${createShopItemHTML('adventurer_set', '⚔️', 'Набор авантюриста', 'Ремнабор + Зелье энергии + 250💰', 25)}
            ${createShopItemHTML('hero_set', '🛡️', 'Набор героя', 'Б.зелье энергии + 1000💰 + Зелье', 45)}
          </div>
        </div>
        <div style="text-align: center; margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 20px;">
          <p style="font-size: 0.8rem; opacity: 0.7;">⭐ Покупки в Telegram Stars</p>
          <p style="font-size: 0.7rem; opacity: 0.5;">После оплаты предмет появится в инвентаре</p>
        </div>
      `;
      
      // Навешиваем обработчики на кнопки
      document.querySelectorAll('[data-item-id]').forEach(el => {
        const btn = el.querySelector('.buy-btn');
        if (btn) {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const itemId = el.dataset.itemId;
            const price = parseInt(el.dataset.price);
            const name = el.querySelector('.item-name')?.textContent || 'предмет';
            
            tg.showPopup({
              title: 'Подтверждение',
              message: `Купить "${name}" за ${price} ⭐?`,
              buttons: [
                { type: 'default', text: '✅ Купить', id: 'buy' },
                { type: 'cancel', text: '❌ Отмена' }
              ]
            }, (buttonId) => {
              if (buttonId === 'buy') purchaseItem(itemId, price);
            });
          });
        }
      });
    }
  
    function createShopItemHTML(id, icon, name, desc, price) {
      return `
        <div class="shop-item-card" data-item-id="${id}" data-price="${price}">
          <div style="font-size: 2.5rem;">${icon}</div>
          <div class="item-name">${name}</div>
          <div class="item-desc">${desc}</div>
          <div class="price-tag">⭐ ${price}</div>
          <button class="buy-btn">Купить</button>
        </div>
      `;
    }
  
    // ==================== ПОКУПКИ ====================
    async function purchaseItem(itemId, price) {
      try {
        const chatId = getChatId();
        if (!chatId) {
          tg.showPopup({ title: '❌ Ошибка', message: 'Не удалось определить пользователя', buttons: [{ type: 'cancel' }] });
          return;
        }
        
        const response = await fetch(`${PAYMENT_API_URL}/api/purchase`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: chatId, item_id: itemId })
        });
        
        const data = await response.json();
        
        if (!data.success) {
          throw new Error(data.error || 'Ошибка создания платежа');
        }
        
        const paymentInfo = {
          payload: data.payload,
          itemId: itemId,
          price: price,
          timestamp: Date.now(),
          expiresIn: data.expires_in || 600
        };
        localStorage.setItem('pending_payment', JSON.stringify(paymentInfo));
        
        tg.openLink(data.invoice_link);
        
      } catch (error) {
        console.error('Payment error:', error);
        tg.showPopup({ title: '❌ Ошибка', message: error.message || 'Не удалось создать платеж', buttons: [{ type: 'cancel' }] });
      }
    }
  
    async function checkPaymentStatus(payload) {
      try {
        const response = await fetch(`${PAYMENT_API_URL}/api/purchase/${payload}/status`);
        const data = await response.json();
        
        if (data.success) {
          if (data.status === 'completed') {
            tg.showPopup({
              title: '✅ Покупка завершена!',
              message: `Предмет "${data.item_name}" добавлен в инвентарь`,
              buttons: [{ type: 'default', text: 'OK' }]
            });
            localStorage.removeItem('pending_payment');
            loadCharacterData();
          } else if (data.status === 'expired') {
            tg.showPopup({
              title: '⏰ Время истекло',
              message: 'Платеж не был завершен вовремя',
              buttons: [{ type: 'default', text: 'OK' }]
            });
            localStorage.removeItem('pending_payment');
          }
        }
      } catch (error) {
        console.error('Error checking payment:', error);
      }
    }
  
    function checkPendingPayment() {
      const pending = localStorage.getItem('pending_payment');
      if (!pending) return;
      
      try {
        const payment = JSON.parse(pending);
        const age = (Date.now() - payment.timestamp) / 1000;
        const maxAge = payment.expiresIn || 600;
        
        if (age < maxAge) {
          checkPaymentStatus(payment.payload);
        } else {
          localStorage.removeItem('pending_payment');
        }
      } catch (e) {
        localStorage.removeItem('pending_payment');
      }
    }
  
    // ==================== ПОДПИСКИ ====================
    async function loadSubscriptionStatus() {
      try {
        const chatId = getChatId();
        if (!chatId) return;
        
        const response = await fetch(`${API_BASE_URL}/api/user/${chatId}/subscription`);
        const data = await response.json();
        
        const card = document.getElementById('active-subscription-card-new');
        const nameEl = document.getElementById('active-sub-name-new');
        const expiresEl = document.getElementById('active-sub-expires-new');
        
        if (data.success && data.subscription) {
          activeSubscription = data.subscription;
          const sub = SUBSCRIPTIONS.find(s => s.id === data.subscription.id) || { name: data.subscription.id };
          if (nameEl) nameEl.textContent = sub.name;
          if (expiresEl) {
            const expiryDate = new Date(data.subscription.expires_at * 1000);
            expiresEl.textContent = `Действует до: ${expiryDate.toLocaleDateString()}`;
          }
          if (card) card.style.display = 'block';
        } else {
          activeSubscription = null;
          if (card) card.style.display = 'none';
        }
      } catch (error) {
        console.error('Error loading subscription:', error);
      }
    }
  
    function renderSubscriptions() {
      const grid = document.getElementById('subscriptions-grid-new');
      if (!grid) return;
      
      grid.innerHTML = '';
      
      SUBSCRIPTIONS.forEach(sub => {
        const card = document.createElement('div');
        card.className = 'shop-item-card';
        card.style.gridColumn = 'span 2';
        card.style.padding = '20px';
        
        const featuresHtml = sub.features.map(f => `<li style="text-align: left; font-size: 0.75rem; margin-bottom: 5px;">${f}</li>`).join('');
        
        card.innerHTML = `
          <div style="font-size: 2.5rem; margin-bottom: 5px;">${sub.name.split(' ')[0]}</div>
          <div class="item-name" style="font-size: 1.2rem;">${sub.name}</div>
          <div class="price-tag" style="margin: 15px 0;">⭐ ${sub.price} / месяц</div>
          <ul style="padding-left: 20px; margin: 15px 0; min-height: 140px;">
            ${featuresHtml}
          </ul>
          <button class="buy-btn subscribe-btn" data-sub-id="${sub.id}" data-sub-price="${sub.price}">
            Оформить подписку
          </button>
        `;
        
        grid.appendChild(card);
      });
      
      // Обработчики подписок
      document.querySelectorAll('.subscribe-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const subId = btn.dataset.subId;
          const subPrice = parseInt(btn.dataset.subPrice);
          const sub = SUBSCRIPTIONS.find(s => s.id === subId);
          
          // Проверяем активную подписку
          let activeSub = null;
          try {
            const chatId = getChatId();
            if (chatId) {
              const res = await fetch(`${API_BASE_URL}/api/user/${chatId}/subscription`);
              const data = await res.json();
              if (data.success && data.subscription) activeSub = data.subscription;
            }
          } catch (e) {}
          
          if (activeSub) {
            if (activeSub.id === subId) {
              tg.showPopup({ title: 'ℹ️ Информация', message: `У вас уже активен тариф "${sub.name}"`, buttons: [{ type: 'cancel' }] });
              return;
            }
            
            const currentSub = SUBSCRIPTIONS.find(s => s.id === activeSub.id) || { name: activeSub.id };
            const daysLeft = Math.ceil((activeSub.expires_at - Date.now()/1000) / (24*3600));
            
            tg.showPopup({
              title: '⚠️ Апгрейд подписки',
              message: `У вас осталось ${daysLeft} дн. по тарифу "${currentSub.name}". При апгрейде оставшиеся дни сгорят. Продолжить?`,
              buttons: [
                { type: 'default', text: '✅ Да', id: 'upgrade' },
                { type: 'cancel', text: '❌ Нет' }
              ]
            }, (id) => { if (id === 'upgrade') purchaseSubscription(subId, subPrice); });
          } else {
            tg.showPopup({
              title: '✨ Подписка',
              message: `Оформить подписку "${sub.name}" за ${subPrice} ⭐ в месяц?`,
              buttons: [
                { type: 'default', text: '✅ Оформить', id: 'subscribe' },
                { type: 'cancel', text: '❌ Отмена' }
              ]
            }, (id) => { if (id === 'subscribe') purchaseSubscription(subId, subPrice); });
          }
        });
      });
    }
  
    async function purchaseSubscription(subscriptionId, price) {
      try {
        const chatId = getChatId();
        if (!chatId) {
          tg.showPopup({ title: '❌ Ошибка', message: 'Не удалось определить пользователя', buttons: [{ type: 'cancel' }] });
          return;
        }
        
        tg.MainButton.showProgress();
        
        const response = await fetch(`${PAYMENT_API_URL}/api/create_subscription`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: chatId, subscription_id: subscriptionId })
        });
        
        tg.MainButton.hideProgress();
        
        const data = await response.json();
        
        if (!data.success) {
          throw new Error(data.error || 'Ошибка создания подписки');
        }
        
        tg.openInvoice(data.invoice_link, (status) => {
          if (status === 'paid') {
            tg.showPopup({
              title: '🎉 Успех!',
              message: 'Подписка оформлена! Ежедневные награды будут приходить в инвентарь.',
              buttons: [{ type: 'default', text: 'Отлично!' }]
            });
            setTimeout(() => {
              loadSubscriptionStatus();
              loadCharacterData();
            }, 3000);
          }
        });
        
      } catch (error) {
        console.error('Subscription error:', error);
        tg.MainButton.hideProgress();
        tg.showPopup({ title: '❌ Ошибка', message: error.message || 'Не удалось создать подписку', buttons: [{ type: 'cancel' }] });
      }
    }
  
    // ==================== НАВИГАЦИЯ ====================
    function initializeTabs() {
      document.querySelectorAll('.nav-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          
          document.querySelectorAll('.nav-pill').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
          document.getElementById(`${tab}-content`).classList.add('active');
          
          if (tab === 'shop') setTimeout(initShop, 50);
          if (tab === 'subscriptions') {
            setTimeout(renderSubscriptions, 50);
            setTimeout(loadSubscriptionStatus, 100);
          }
        });
      });
    }
  
    // ==================== ЗАПУСК ====================
    document.addEventListener('DOMContentLoaded', function() {
      console.log('🚀 Game Master v2.0 - Epic Fantasy UI');
      
      initializeTabs();
      loadCharacterData();
      loadSubscriptionStatus();
      
      updateInterval = setInterval(loadCharacterData, 30000);
      startCoinsMonitoring();
      
      setTimeout(initShop, 200);
      setTimeout(renderSubscriptions, 300);
      
      checkPendingPayment();
      setInterval(checkPendingPayment, 10000);
      
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
          loadCharacterData();
          checkPendingPayment();
        }
      });
    });
  
    window.addEventListener('beforeunload', function() {
      stopCoinsMonitoring();
      if (updateInterval) clearInterval(updateInterval);
    });
  </script>
</body>
</html>
