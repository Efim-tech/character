<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚔️ ХРОНИКИ ГЕРОЯ ⚔️</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       СОВРЕМЕННЫЙ ФЭНТЕЗИ-ДИЗАЙН С НУЛЯ
       ============================================ */
    :root {
      --gold: #ffd700;
      --gold-dim: #b8860b;
      --gold-glow: rgba(255, 215, 0, 0.5);
      --blood: #8b0000;
      --blood-light: #ff4444;
      --sapphire: #0a1930;
      --sapphire-light: #1a3a5c;
      --emerald: #0a3020;
      --amethyst: #2a1030;
      --parchment: #f0e6d2;
      --parchment-dark: #8b7355;
      --shadow: #0a0a0f;
      
      --glass-bg: rgba(10, 20, 30, 0.7);
      --glass-border: rgba(255, 215, 0, 0.2);
      --glass-highlight: rgba(255, 255, 255, 0.05);
      
      --card-radius: 24px;
      --card-padding: 18px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: #0a0f18;
      min-height: 100vh;
      color: var(--parchment);
      overflow-x: hidden;
      position: relative;
    }

    /* ===== ЭПИЧЕСКИЙ ФОН С ПАРАЛЛАКСОМ ===== */
    .background-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Глубокое космическое небо */
    .bg-sky {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 30% 20%, #1a2a4a 0%, #0a1220 50%, #050a10 100%);
    }

    /* Звёзды */
    .bg-stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(2px 2px at 15% 25%, rgba(255, 255, 255, 0.9), transparent),
        radial-gradient(1px 1px at 35% 45%, rgba(255, 255, 255, 0.7), transparent),
        radial-gradient(2px 2px at 55% 15%, rgba(255, 255, 255, 0.8), transparent),
        radial-gradient(1px 1px at 75% 35%, rgba(255, 255, 255, 0.6), transparent),
        radial-gradient(3px 3px at 85% 65%, rgba(255, 255, 255, 0.9), transparent),
        radial-gradient(1px 1px at 10% 75%, rgba(255, 255, 255, 0.7), transparent),
        radial-gradient(2px 2px at 45% 85%, rgba(255, 255, 255, 0.8), transparent),
        radial-gradient(1px 1px at 95% 15%, rgba(255, 255, 255, 0.6), transparent);
      animation: twinkle 4s infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    /* Туманности */
    .bg-nebula {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 150, 200, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 100, 50, 0.08) 0%, transparent 60%);
      filter: blur(40px);
      animation: nebulaFlow 30s infinite alternate ease-in-out;
    }

    @keyframes nebulaFlow {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-2%, 1%) scale(1.05); }
      66% { transform: translate(1%, -2%) scale(1.02); }
      100% { transform: translate(2%, 2%) scale(1.08); }
    }

    /* Горы на горизонте */
    .bg-mountains {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(0deg, 
        #0a1220 0%,
        #0d1a2a 20%,
        #111e30 40%,
        transparent 100%);
      clip-path: polygon(0% 100%, 0% 60%, 8% 45%, 15% 55%, 22% 35%, 30% 50%, 
                         38% 30%, 45% 48%, 52% 25%, 60% 42%, 68% 20%, 75% 38%, 
                         82% 28%, 90% 45%, 95% 35%, 100% 50%, 100% 100%);
    }

    .bg-mountains::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(0deg, 
        #060a12 0%,
        #0a1220 30%,
        transparent 100%);
      clip-path: polygon(0% 100%, 0% 75%, 10% 60%, 20% 70%, 30% 55%, 40% 65%, 
                         50% 45%, 60% 60%, 70% 40%, 80% 55%, 90% 48%, 100% 65%, 100% 100%);
    }

    /* ===== ОСНОВНОЙ КОНТЕЙНЕР ===== */
    .app-container {
      position: relative;
      z-index: 10;
      max-width: 420px;
      margin: 0 auto;
      padding: 12px 14px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 8px 0;
    }

    .hero-identity {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hero-avatar {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 215, 0, 0.3), 0 0 20px var(--gold-glow);
      position: relative;
      overflow: hidden;
    }

    .hero-avatar::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: avatarShine 4s infinite;
    }

    @keyframes avatarShine {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      25% { transform: translateX(100%) translateY(100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    .hero-info h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--parchment), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 2px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .hero-info p {
      font-size: 0.7rem;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Кошелёк в правом верхнем углу */
    .wallet-display {
      background: linear-gradient(135deg, rgba(184, 134, 11, 0.3), rgba(255, 215, 0, 0.1));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 10px 16px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .wallet-display::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
      animation: walletShine 5s infinite;
    }

    @keyframes walletShine {
      0%, 100% { left: -100%; }
      50% { left: 100%; }
    }

    .wallet-icon {
      font-size: 1.3rem;
      filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.5));
    }

    #wallet-value {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 15px var(--gold-glow);
      min-width: 60px;
      text-align: right;
    }

    /* ===== НАВИГАЦИЯ - СТИЛЬНЫЕ ПИЛЮЛИ ===== */
    .nav-pills {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      background: rgba(10, 20, 30, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 6px;
      border-radius: 50px;
      border: 1px solid rgba(255, 215, 0, 0.15);
    }

    .nav-pill {
      flex: 1;
      padding: 12px 8px;
      border: none;
      background: transparent;
      color: var(--parchment-dark);
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .nav-pill.active {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.25), rgba(184, 134, 11, 0.15));
      color: var(--gold);
      text-shadow: 0 0 15px var(--gold-glow);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 4px 12px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 215, 0, 0.3);
    }

    .nav-pill::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 2px;
      background: var(--gold);
      box-shadow: 0 0 15px var(--gold);
      transition: width 0.3s ease;
    }

    .nav-pill.active::after {
      width: 40%;
    }

    /* ===== КОНТЕНТНЫЕ СЕКЦИИ ===== */
    .content-section {
      display: none;
      flex: 1;
      animation: fadeSlide 0.4s ease;
    }

    .content-section.active {
      display: block;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== КАРТОЧКИ ХАРАКТЕРИСТИК ===== */
    .stats-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Основные бары (HP, Energy, Armor) */
    .vital-card {
      background: linear-gradient(145deg, rgba(10, 25, 35, 0.8), rgba(5, 15, 25, 0.9));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 20px var(--card-padding);
      border: 1px solid rgba(255, 215, 0, 0.15);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    .vital-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.5;
    }

    .vital-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .vital-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--parchment);
    }

    .vital-icon {
      font-size: 1.3rem;
    }

    .vital-value {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 15px var(--gold-glow);
    }

    /* Кастомные прогресс-бары */
    .progress-bar-container {
      position: relative;
      height: 28px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 40px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.5);
    }

    .progress-fill {
      height: 100%;
      border-radius: 40px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      animation: barShine 2.5s infinite;
    }

    @keyframes barShine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .hp-fill {
      background: linear-gradient(90deg, #8b0000, #dc143c, #ff4444);
      box-shadow: 0 0 20px rgba(220, 20, 60, 0.6);
    }

    .energy-fill {
      background: linear-gradient(90deg, #1a3a5c, #3498db, #5dade2);
      box-shadow: 0 0 20px rgba(52, 152, 219, 0.6);
    }

    .armor-fill {
      background: linear-gradient(90deg, #2c3e50, #7f8c8d, #bdc3c7);
      box-shadow: 0 0 20px rgba(189, 195, 199, 0.5);
    }

    .crystal-fill {
      background: linear-gradient(90deg, #4a235a, #8e44ad, #d2b4de);
      box-shadow: 0 0 25px rgba(155, 89, 182, 0.8);
      animation: crystalPulse 2.5s infinite;
    }

    @keyframes crystalPulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }

    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.75rem;
      font-weight: 700;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.8);
      color: white;
      z-index: 2;
      white-space: nowrap;
    }

    /* Сетка для остальных статов */
    .stats-grid-3 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .stat-tile {
      background: linear-gradient(145deg, rgba(10, 25, 35, 0.7), rgba(5, 15, 25, 0.8));
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 22px;
      padding: 16px 12px;
      border: 1px solid rgba(255, 215, 0, 0.1);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    .stat-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 215, 0, 0.1);
      border-color: rgba(255, 215, 0, 0.3);
    }

    .stat-tile .icon {
      font-size: 1.8rem;
      margin-bottom: 6px;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.4));
    }

    .stat-tile .value {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 15px var(--gold-glow);
      line-height: 1.2;
    }

    .stat-tile .label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.7;
      margin-top: 4px;
    }

    /* XP Bar специальный */
    .xp-container {
      margin-top: 8px;
    }

    .xp-bar-small {
      height: 8px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      overflow: hidden;
      margin: 8px 0 4px;
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    .xp-fill-small {
      height: 100%;
      background: linear-gradient(90deg, #b8860b, #ffd700, #ffaa00);
      border-radius: 10px;
      box-shadow: 0 0 10px #ffd700;
    }

    /* Карточка оружия */
    .weapon-showcase {
      background: linear-gradient(145deg, rgba(20, 40, 50, 0.8), rgba(10, 20, 30, 0.9));
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 18px var(--card-padding);
      border: 1px solid rgba(255, 215, 0, 0.2);
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 5px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    }

    .weapon-icon {
      font-size: 2.5rem;
      filter: drop-shadow(0 0 15px var(--gold-glow));
    }

    .weapon-details {
      flex: 1;
    }

    .weapon-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.6;
    }

    #weapon-value {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--parchment);
    }

    /* Статус (Жив/Мёртв) */
    .status-indicator {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 10px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-alive {
      color: #2ecc71;
      text-shadow: 0 0 10px #2ecc71;
      border-color: #2ecc71;
    }

    .status-dead {
      color: #ff4444;
      text-shadow: 0 0 10px #ff4444;
      border-color: #ff4444;
    }

    /* ===== ИНВЕНТАРЬ ===== */
    .inventory-header-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      padding: 12px 16px;
      background: rgba(10, 25, 35, 0.5);
      backdrop-filter: blur(15px);
      border-radius: 40px;
      border: 1px solid rgba(255, 215, 0, 0.15);
    }

    .inventory-grid-new {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .item-card {
      background: linear-gradient(145deg, rgba(15, 30, 40, 0.9), rgba(8, 18, 28, 0.95));
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 16px 10px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      transition: all 0.25s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .item-card:hover {
      transform: translateY(-3px);
      border-color: var(--gold);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 20px var(--gold-glow);
    }

    .item-card.equipped {
      border: 2px solid #2ecc71;
      box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
    }

    .item-card.equipped::after {
      content: '⚔️';
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: 0.8rem;
      background: #2ecc71;
      padding: 3px 6px;
      border-radius: 30px;
      color: white;
      font-weight: bold;
    }

    .item-icon-large {
      font-size: 2.8rem;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
    }

    .item-name {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .item-desc {
      font-size: 0.65rem;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .item-footer-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 215, 0, 0.2);
    }

    .item-quantity-badge {
      background: var(--gold-dim);
      padding: 3px 10px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #0a0f18;
    }

    /* ===== МАГАЗИН И ПОДПИСКИ ===== */
    .shop-category {
      margin-bottom: 24px;
    }

    .shop-category-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.9rem;
    }

    .shop-grid-new {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .shop-item-card {
      background: linear-gradient(145deg, rgba(15, 30, 40, 0.9), rgba(8, 18, 28, 0.95));
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 16px 10px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      text-align: center;
      transition: all 0.25s ease;
    }

    .shop-item-card:hover {
      border-color: var(--gold);
      box-shadow: 0 0 25px var(--gold-glow);
    }

    .price-tag {
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      color: #0a0f18;
      padding: 6px 12px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.8rem;
      display: inline-block;
      margin: 10px 0;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .buy-btn {
      background: transparent;
      border: 1.5px solid var(--gold);
      color: var(--gold);
      padding: 10px 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      font-family: 'Cinzel', serif;
    }

    .buy-btn:hover {

  <script>
    
    const API_BASE_URL = 'https://gmbtg-efich.amvera.io';
    const PAYMENT_API_URL = 'https://gmbtest-efich.amvera.io';
    const SUBSCRIPTIONS = [
      { id: 'sub_adventurer', name: '🧭 Авантюрист', price: 1, features: ['+1 большое зелье энергии', '+50 серебряных монет'] },
      { id: 'sub_hero', name: '⚔️ Герой', price: 1, features: ['+2 больших зелья энергии', '+100 серебряных монет', '+1 бинт'] },
      { id: 'sub_champion', name: '👑 Чемпион', price: 1, features: ['+3 больших зелья энергии', '+200 серебряных монет', '+1 бинт', '+1 ремонтный набор'] },
      { id: 'sub_legend', name: '🌟 Легенда', price: 1, features: ['+5 больших зелий энергии', '+300 серебряных монет', '+1 зелье здоровья', '+1 ремонтный набор'] },
      { id: 'sub_crystal_novice', name: '🔮 Послушник кристалла', price: 1, features: ['+5 зарядов кристалла', '+1 большое зелье энергии', '+150 серебряных монет', '+2 бинта'] },
      { id: 'sub_crystal_master', name: '💎 Мастер кристалла', price: 1, features: ['+15 зарядов кристалла', '+2 больших зелья энергии', '+250 серебряных монет', '+2 зелья здоровья', '+2 ремонтных набора'] },
      { id: 'sub_crystal_archon', name: '✨ Архонт кристалла', price: 1, features: ['+25 зарядов кристалла', '+3 больших зелья энергии', '+500 серебряных монет', '+3 зелья здоровья', '+3 ремонтных набора'] }
    ];
    
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.BackButton.hide();
    tg.enableClosingConfirmation();
    
    let characterData = {};
    let activeSubscription = null;
    let updateInterval;
    let coinsCheckInterval;
    let lastDeathCheckTime = 0;
    const DEATH_CHECK_COOLDOWN = 5000;

    function getChatId() {
      const urlParams = new URLSearchParams(window.location.search);
      const startappParam = urlParams.get('startapp');
      if (startappParam) return startappParam;
      if (tg.initDataUnsafe && tg.initDataUnsafe.user) return tg.initDataUnsafe.user.id;
      if (tg.initDataUnsafe && tg.initDataUnsafe.start_param) return tg.initDataUnsafe.start_param;
      return null;
    }

    function showLoading(show) {
      document.getElementById('loading-message').style.display = show ? 'block' : 'none';
    }

    function showError(message) {
      const errorElement = document.getElementById('error-message');
      errorElement.innerHTML = `❌ ${message}`;
      errorElement.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error-message').style.display = 'none';
    }

    async function purchaseItem(itemId, price) {
      try {
        const chatId = getChatId();
        if (!chatId) {
          tg.showPopup({ title: '❌ Ошибка', message: 'Не удалось определить пользователя', buttons: [{ type: 'cancel', text: 'Закрыть' }] });
          return;
        }
        const response = await fetch(`${PAYMENT_API_URL}/api/purchase`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: chatId, item_id: itemId })
        });
        const data = await response.json();
        if (!data.success) throw new Error(data.error || 'Ошибка создания платежа');
        
        const paymentInfo = { payload: data.payload, itemId: itemId, price: price, timestamp: Date.now(), expiresIn: data.expires_in };
        localStorage.setItem('pending_payment', JSON.stringify(paymentInfo));
        tg.openLink(data.invoice_link);
      } catch (error) {
        console.error('Payment error:', error);
        tg.showPopup({ title: '❌ Ошибка', message: error.message || 'Не удалось создать платеж', buttons: [{ type: 'cancel', text: 'Закрыть' }] });
      }
    }

    async function checkPaymentStatus(payload) {
      try {
        const response = await fetch(`${PAYMENT_API_URL}/api/purchase/${payload}/status`);
        const data = await response.json();
        if (data.success) {
          if (data.status === 'completed') {
            tg.showPopup({ title: '✅ Покупка завершена!', message: `Предмет "${data.item_name}" добавлен в инвентарь`, buttons: [{ type: 'default', text: 'OK' }] });
            localStorage.removeItem('pending_payment');
            loadCharacterData();
          } else if (data.status === 'expired') {
            tg.showPopup({ title: '⏰ Время истекло', message: 'Платеж не был завершен вовремя. Попробуйте снова.', buttons: [{ type: 'default', text: 'OK' }] });
            localStorage.removeItem('pending_payment');
          }
        }
      } catch (error) {
        console.error('Error checking payment:', error);
      }
    }

    function checkPendingPayment() {
      const pending = localStorage.getItem('pending_payment');
      if (pending) {
        try {
          const payment = JSON.parse(pending);
          const age = (Date.now() - payment.timestamp) / 1000;
          const maxAge = payment.expiresIn || 600;
          if (age < maxAge) checkPaymentStatus(payment.payload);
          else localStorage.removeItem('pending_payment');
        } catch (e) {
          localStorage.removeItem('pending_payment');
        }
      }
    }

    function initShop() {
      // Динамическое создание магазина остается без изменений
      const shopContent = document.getElementById('shop-content');

            <div class="shop-item" data-item-id="crystal_charge_10" data-price="5"><div class="shop-item-icon">🔮🔮</div><div class="shop-item-name">Средний заряд</div><div class="shop-item-description">+10 зарядов</div><button class="buy-button">Купить за 5⭐</button></div>
            <div class="shop-item" data-item-id="crystal_charge_25" data-price="10"><div class="shop-item-icon">🔮🔮🔮</div><div class="shop-item-name">Большой заряд</div><div class="shop-item-description">+25 зарядов</div><button class="buy-button">Купить за 10⭐</button></div>
            <div class="shop-item" data-item-id="crystal_charge_50" data-price="18"><div class="shop-item-icon">💎</div><div class="shop-item-name">Огромный заряд</div><div class="shop-item-description">+50 зарядов</div><button class="buy-button">Купить за 18⭐</button></div>
          </div>
        </div>
        <div style="margin-bottom: 15px;">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
            <span style="font-size: 1.2rem;">💰</span>
            <span style="font-weight: bold; color: var(--primary-gold);">Серебряные монеты</span>
          </div>
          <div class="shop-grid">
            <div class="shop-item" data-item-id="coins500" data-price="10"><div class="shop-item-icon">💰</div><div class="shop-item-name">500 монет</div><button class="buy-button">Купить за 1⭐</button></div>
            <div class="shop-item" data-item-id="coins1000" data-price="18"><div class="shop-item-icon">💰💰</div><div class="shop-item-name">1000 монет</div><button class="buy-button">Купить за 18⭐</button></div>
            <div class="shop-item" data-item-id="coins2500" data-price="40"><div class="shop-item-icon">💰💰💰</div><div class="shop-item-name">2500 монет</div><button class="buy-button">Купить за 40⭐</button></div>

        newButton.addEventListener('click', async (e) => {
          e.preventDefault();
          const itemId = item.dataset.itemId;
          const price = parseInt(item.dataset.price);
          const itemName = item.querySelector('.shop-item-name').textContent;
          tg.showPopup({

            message: `Купить ${itemName} за ${price} ⭐?`,
            buttons: [{ type: 'default', text: '✅ Купить', id: 'buy' }, { type: 'cancel', text: '❌ Отмена' }]
          }, (buttonId) => { if (buttonId === 'buy') purchaseItem(itemId, price); });
        });
      });

    async function loadSubscriptionStatus() {
      try {
        const chatId = getChatId();
        if (!chatId) return;
        const response = await fetch(`${API_BASE_URL}/api/user/${chatId}/subscription`);
        const data = await response.json();
        const activeCard = document.getElementById('active-subscription-card');
        const activeName = document.getElementById('active-sub-name');
        const activeExpires = document.getElementById('active-sub-expires');
        if (data.success && data.subscription) {
          activeSubscription = data.subscription;
          const sub = SUBSCRIPTIONS.find(s => s.id === data.subscription.id) || { name: data.subscription.id };
          activeName.textContent = sub.name;
          const expiryDate = new Date(data.subscription.expires_at * 1000);
          activeExpires.textContent = `Действует до: ${expiryDate.toLocaleDateString()}`;
          activeCard.style.display = 'block';
        } else {
          activeSubscription = null;
          activeCard.style.display = 'none';

        console.error('Error loading subscription status:', error);

      const grid = document.getElementById('subscriptions-grid');

      grid.innerHTML = '';
      SUBSCRIPTIONS.forEach(sub => {
        const card = document.createElement('div');
        card.className = 'shop-item';

        card.style.padding = '15px';

          <div style="font-size: 2rem; margin-bottom: 5px;">${sub.name.split(' ')[0]}</div>
          <div class="shop-item-name" style="font-size: 1.2rem; margin-bottom: 10px;">${sub.name}</div>
          <div class="shop-item-price" style="margin-bottom: 15px;">⭐ ${sub.price} / месяц</div>
          <ul style="padding-left: 20px; margin-bottom: 20px; min-height: 120px;">${featuresHtml}</ul>
          <button class="buy-button subscribe-btn" data-sub-id="${sub.id}" data-sub-price="${sub.price}">Оформить</button>
        `;
        grid.appendChild(card);
      });
      
      document.querySelectorAll('.subscribe-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const subId = btn.dataset.subId;
          const subPrice = parseInt(btn.dataset.subPrice);
          const subName = SUBSCRIPTIONS.find(s => s.id === subId).name;
          let activeSubscription = null;
          try {
            const chatId = getChatId();
            if (chatId) {
              const response = await fetch(`${API_BASE_URL}/api/user/${chatId}/subscription`);
              const data = await response.json();
              if (data.success && data.subscription) activeSubscription = data.subscription;
            }
          } catch (error) { console.error('Error checking subscription:', error); }
          
          if (activeSubscription) {
            if (activeSubscription.id === subId) {
              tg.showPopup({ title: 'ℹ️ Информация', message: `У вас уже активен тариф "${subName}".`, buttons: [{ type: 'cancel', text: 'Закрыть' }] });
              return;
            }
            const currentSub = SUBSCRIPTIONS.find(s => s.id === activeSubscription.id) || { name: activeSubscription.id };
            const now = Date.now() / 1000;
            const daysLeft = Math.ceil((activeSubscription.expires_at - now) / (24 * 3600));
            tg.showPopup({
              title: '⚠️ Апгрейд подписки',
              message: `У вас осталось ${daysLeft} дн. по тарифу "${currentSub.name}".\n\nПри апгрейде оставшиеся дни сгорят. Продолжить?`,
              buttons: [{ type: 'default', text: '✅ Да, апгрейд', id: 'upgrade' }, { type: 'cancel', text: '❌ Отмена' }]
            }, (buttonId) => { if (buttonId === 'upgrade') purchaseSubscription(subId, subPrice); });
          } else {
            tg.showPopup({
              title: '✨ Подписка',
              message: `Оформить подписку "${subName}" за ${subPrice} ⭐ в месяц?`,
              buttons: [{ type: 'default', text: '✅ Оформить', id: 'subscribe' }, { type: 'cancel', text: '❌ Отмена' }]
            }, (buttonId) => { if (buttonId === 'subscribe') purchaseSubscription(subId, subPrice); });
          }
        });
      });
    }
    
    async function purchaseSubscription(subscriptionId, price) {
      try {
        const chatId = getChatId();
        if (!chatId) {
          tg.showPopup({ title: '❌ Ошибка', message: 'Не удалось определить пользователя', buttons: [{ type: 'cancel', text: 'Закрыть' }] });
          return;
        }
        tg.MainButton.showProgress();
        const response = await fetch(`${PAYMENT_API_URL}/api/create_subscription`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: chatId, subscription_id: subscriptionId })
        });
        tg.MainButton.hideProgress();
        const data = await response.json();
        if (!data.success) throw new Error(data.error || 'Ошибка создания подписки');
        tg.openInvoice(data.invoice_link, (status) => {
          if (status === 'paid') {
            tg.showPopup({ title: '🎉 Успех!', message: 'Подписка оформлена!', buttons: [{ type: 'default', text: 'Отлично!' }] });
            setTimeout(() => { loadSubscriptionStatus(); loadCharacterData(); }, 3000);
          }
        });
      } catch (error) {
        console.error('Subscription error:', error);
        tg.MainButton.hideProgress();
        tg.showPopup({ title: '❌ Ошибка', message: error.message || 'Не удалось создать подписку', buttons: [{ type: 'cancel', text: 'Закрыть' }] });
      }
    }

    async function loadCharacterData() {
      try {
        showLoading(true);
        hideError();
        const chatId = getChatId();
        if (!chatId) throw new Error('Не удалось определить пользователя');
        const response = await fetch(`${API_BASE_URL}/api/character/${chatId}/full`);
        const data = await response.json();
        if (data.success) {
          characterData = data.data;
          updateUI();
          showLoading(false);
          if (characterData.hp <= 0) setTimeout(() => checkDeathOnHPChange(), 1000);
        } else {
          throw new Error(data.error || 'Ошибка загрузки данных');
        }
      } catch (error) {
        console.error('❌ Error loading character data:', error);
        showLoading(false);
        showError(error.message);
      }
    }

    function updateUI() {
      document.getElementById('character-name').textContent = characterData.name || 'Безымянный герой';
      const previousHP = window.previousCharacterData?.hp || characterData.hp;
      const previousArmor = window.previousCharacterData?.armor || characterData.armor;
      if (previousHP > characterData.hp) showDamageNotification(previousHP - characterData.hp);
      if (previousArmor > characterData.armor) showArmorDamageNotification(previousArmor - characterData.armor);
      window.previousCharacterData = { hp: characterData.hp, armor: characterData.armor, max_hp: characterData.max_hp, max_armor: characterData.max_armor, coins: characterData.coins };
      
      const hpPercent = characterData.max_hp > 0 ? (characterData.hp / characterData.max_hp) * 100 : 0;
      document.getElementById('hp-value').textContent = `${characterData.hp}/${characterData.max_hp}`;
      document.getElementById('health-fill').style.width = `${hpPercent}%`;
      document.getElementById('health-text').textContent = `${characterData.hp}/${characterData.max_hp}`;
      
      const energyCurrent = characterData.energy?.current || 0;
      const energyMax = characterData.energy?.max || 0;
      const energyPercent = energyMax > 0 ? (energyCurrent / energyMax) * 100 : 0;
      document.getElementById('energy-value').textContent = `${energyCurrent}/${energyMax}`;
      document.getElementById('energy-fill').style.width = `${energyPercent}%`;
      document.getElementById('energy-text').textContent = `${energyCurrent}/${energyMax}`;

      const crystalsCurrent = characterData.visual_energy?.current || 0;
      const crystalsMax = characterData.visual_energy?.max || 50;
      const crystalsPercent = crystalsMax > 0 ? (crystalsCurrent / crystalsMax) * 100 : 0;
      document.getElementById('crystal-value').textContent = `${crystalsCurrent}/${crystalsMax}`;
      document.getElementById('crystal-fill').style.width = `${crystalsPercent}%`;
      document.getElementById('crystal-text').textContent = `${crystalsCurrent}/${crystalsMax}`;
      
      const armorPercent = characterData.max_armor > 0 ? (characterData.armor / characterData.max_armor) * 100 : 0;
      document.getElementById('armor-value').textContent = characterData.armor || 0;
      document.getElementById('armor-fill').style.width = `${armorPercent}%`;
      document.getElementById('armor-text').textContent = characterData.armor || 0;
      
      const level = characterData.level || 1;
      const xp = characterData.xp || 0;
      const xpToNext = characterData.xp_to_next || 100;
      const xpPercent = xpToNext > 0 ? (xp / xpToNext) * 100 : 0;
      const levelTitle = characterData.level_title || 'Наемник';
      document.getElementById('level-value').textContent = level;
      document.getElementById('level-title').textContent = `(${levelTitle})`;
      document.getElementById('xp-fill').style.width = `${xpPercent}%`;
      document.getElementById('xp-text').textContent = `${xp}/${xpToNext} XP`;
      
      const coins = characterData.coins || 0;
      document.getElementById('coins-value').textContent = coins;
      const coinsElement = document.getElementById('coins-value');
      if (coins < 100) coinsElement.style.color = '#ff6b6b';
      else if (coins < 500) coinsElement.style.color = '#ffd700';
      else coinsElement.style.color = '#daa520';
      
      document.getElementById('weapon-value').textContent = characterData.weapon || 'Нет';
      
      const statusElement = document.getElementById('status-value');
      if (characterData.hp <= 0 || !characterData.is_alive || characterData.is_dead) {
        statusElement.textContent = 'Мёртв';
        statusElement.className = 'stat-value status-dead';
      } else {
        statusElement.textContent = 'Жив';
        statusElement.className = 'stat-value status-alive';
      }
      
      updateInventory();
      if (characterData.hp <= 0 && !characterData.is_dead && !window.deathCheckScheduled) {
        window.deathCheckScheduled = true;
        setTimeout(() => { checkDeathOnHPChange(); window.deathCheckScheduled = false; }, 1000);
      }
    }

    function updateInventory() {
      const inventoryGrid = document.getElementById('inventory-grid');
      const emptyMessage = document.getElementById('inventory-empty');
      const inventoryStats = document.getElementById('inventory-stats');
      if (!characterData.inventory || characterData.inventory.length === 0) {
        inventoryGrid.innerHTML = '';
        emptyMessage.style.display = 'block';
        inventoryStats.textContent = '0 предметов';
        return;
      }
      emptyMessage.style.display = 'none';
      inventoryGrid.innerHTML = '';
      const sortedInventory = [...characterData.inventory].sort((a, b) => {
        if (a.is_equipped && !b.is_equipped) return -1;
        if (!a.is_equipped && b.is_equipped) return 1;
        return (a.name || '').localeCompare(b.name || '');
      });
      sortedInventory.forEach(item => {
        const itemElement = document.createElement('div');
        const rarity = item.is_equipped ? 'legendary' : (item.type === 'weapon' || item.type === 'armor' ? 'rare' : (item.type === 'potion' || item.type === 'medical' ? 'uncommon' : 'common'));
        itemElement.className = `inventory-item-card item-rarity-${rarity} ${item.is_equipped ? 'inventory-item-equipped' : ''}`;
        const icon = item.name?.includes('Большое') ? '🧴' : (item.name?.includes('Среднее') ? '⚗️' : (item.name?.includes('Маленькое') ? '🧪' : (item.type === 'weapon' ? '⚔️' : (item.type === 'armor' ? '🛡️' : (item.type === 'potion' ? '🧪' : (item.type === 'medical' ? '🩹' : (item.type === 'repair' ? '🔧' : '🎁')))))));
        const typeName = item.type === 'weapon' ? 'Оружие' : (item.type === 'armor' ? 'Броня' : (item.type === 'potion' ? 'Зелье' : (item.type === 'medical' ? 'Медицина' : (item.type === 'repair' ? 'Ремонт' : 'Предмет'))));
        itemElement.innerHTML = `
          <div class="inventory-item-icon">${icon}</div>
          <div class="inventory-item-name" title="${item.name}">${item.name}</div>
          <div class="inventory-item-description">${item.description || 'Обычный предмет'}</div>
          <div class="inventory-item-footer">
            <span class="inventory-item-quantity">x${item.quantity || 1}</span>
            <span class="inventory-item-type">${typeName}</span>
          </div>
        `;
        itemElement.addEventListener('click', () => showItemDetails(item));
        inventoryGrid.appendChild(itemElement);
      });
      const totalItems = sortedInventory.reduce((sum, item) => sum + (item.quantity || 1), 0);
      inventoryStats.textContent = `${sortedInventory.length} предметов (${totalItems} шт.)`;
    }

    function showItemDetails(item) {
      let buttons = [];
      if (item.type === 'potion' || item.type === 'medical' || item.type === 'repair' || item.type === 'consumable') {
        buttons.push({ type: 'default', text: '🧪 Использовать', id: 'use_item' });
      }
      buttons.push({ type: 'cancel', text: 'Закрыть' });
      let message = `${item.description || 'Описание отсутствует'}\n\nТип: ${item.type}\nКоличество: ${item.quantity}`;
      if (item.effects && item.effects.visual_energy) message += `\n\n🔮 Восстановит: ${item.effects.visual_energy} зарядов кристалла`;
      tg.showPopup({ title: item.name, message: message, buttons: buttons }, (buttonId) => { if (buttonId === 'use_item') useItem(item.name); });
    }

    async function useItem(itemName) {
      try {
        const chatId = getChatId();
        if (!chatId) { tg.showPopup({ title: 'Ошибка', message: 'Не удалось определить пользователя', buttons: [{ type: 'cancel', text: 'Закрыть' }] }); return; }
        const response = await fetch(`${API_BASE_URL}/api/character/${chatId}/use_item`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ item_name: itemName })
        });
        const data = await response.json();
        if (data.success) {
          tg.showPopup({ title: '✅ Успех', message: data.message, buttons: [{ type: 'cancel', text: 'Закрыть' }] });
          setTimeout(() => loadCharacterData(), 1000);
        } else {
          tg.showPopup({ title: '❌ Ошибка', message: data.error || 'Не удалось использовать предмет', buttons: [{ type: 'cancel', text: 'Закрыть' }] });
        }
      } catch (error) {
        console.error('Error using item:', error);
        tg.showPopup({ title: '❌ Ошибка', message: 'Ошибка при использовании предмета', buttons: [{ type: 'cancel', text: 'Закрыть' }] });
      }
    }

    async function checkDeathOnHPChange() {
      const now = Date.now();
      if (now - lastDeathCheckTime < DEATH_CHECK_COOLDOWN) return;
      lastDeathCheckTime = now;
      const chatId = getChatId();
      if (!chatId) return;
      const hpElement = document.getElementById('hp-value');
      if (!hpElement) return;
      const currentHP = parseInt(hpElement.textContent.split('/')[0]);
      if (currentHP <= 0) {
        const response = await fetch(`${API_BASE_URL}/api/character/${chatId}/check_death`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ hp: currentHP, armor: characterData.armor || 0 })
        });
        const data = await response.json();
        if (data.success && data.death_detected) showDeathInWebApp(data.character_name);
      }
    }

    function showDeathInWebApp(characterName) {
      if (updateInterval) { clearInterval(updateInterval); updateInterval = null; }
      stopCoinsMonitoring();
      const deathMessage = document.createElement('div');
      deathMessage.className = 'error-message';
      deathMessage.innerHTML = `<h3>💀 ${characterName.toUpperCase()} ПАЛ В БОЮ!</h3><p>Проверьте Telegram для создания нового героя</p>`;
      const container = document.querySelector('.container');
      container.insertBefore(deathMessage, container.firstChild);
      document.querySelectorAll('button, .inventory-item-card, .tab-button').forEach(el => { el.style.pointerEvents = 'none'; el.style.opacity = '0.5'; });
      setTimeout(() => { tg.showAlert('Персонаж мертв. Проверьте Telegram.'); setTimeout(() => tg.close(), 3000); }, 10000);
    }

    function showDamageNotification(damage) {
      addShakeEffect();
      const damageMsg = document.createElement('div');
      damageMsg.className = 'damage-notification';
      damageMsg.textContent = `-${damage} ❤️`;
      document.body.appendChild(damageMsg);
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      setTimeout(() => damageMsg.remove(), 1500);
    }

    function showArmorDamageNotification(damage) {
      const armorMsg = document.createElement('div');
      armorMsg.className = 'armor-damage-notification';
      armorMsg.textContent = `-${damage} 🛡️`;
      document.body.appendChild(armorMsg);
      setTimeout(() => armorMsg.remove(), 1500);
    }

    function addShakeEffect() {
      const container = document.querySelector('.container');
      container.classList.add('shake-on-damage');
      setTimeout(() => container.classList.remove('shake-on-damage'), 400);
    }

    async function checkCoinsBalance(forceUpdate = false) {
      try {
        const chatId = getChatId();
        if (!chatId) return;
        const response = await fetch(`${API_BASE_URL}/api/character/${chatId}/coins`);
        const data = await response.json();
        if (data.success) {
          const coinsElement = document.getElementById('coins-value');
          const currentCoins = parseInt(coinsElement.textContent) || 0;
          if (forceUpdate || currentCoins !== data.coins) {
            coinsElement.textContent = data.coins;
            if (characterData) characterData.coins = data.coins;
          }
        }
      } catch (error) { console.error('Error checking coins balance:', error); }
    }

    function startAutoUpdate() { updateInterval = setInterval(loadCharacterData, 30000); }
    function startCoinsMonitoring() { coinsCheckInterval = setInterval(() => checkCoinsBalance(false), 5000); }
    function stopCoinsMonitoring() { if (coinsCheckInterval) clearInterval(coinsCheckInterval); }

    function initializeTabs() {
      document.querySelectorAll('.tab-button').forEach(button => {
        button.addEventListener('click', function() {
          const targetTab = this.getAttribute('data-tab');
          document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
          this.classList.add('active');
          document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
          document.getElementById(`${targetTab}-content`).classList.add('active');
          if (targetTab === 'shop') setTimeout(() => initShop(), 100);
          if (targetTab === 'subscriptions') setTimeout(() => { renderSubscriptions(); loadSubscriptionStatus(); }, 50);
        });
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      tg.expand(); tg.BackButton.hide(); tg.enableClosingConfirmation();
      console.log('🚀 Game Master Web App initialized');
      initializeTabs();
      loadCharacterData();
      startAutoUpdate();
      startCoinsMonitoring();
      setTimeout(() => { initShop(); console.log('🛒 Shop initialized'); }, 500);
      setTimeout(() => { renderSubscriptions(); loadSubscriptionStatus(); }, 800);
      checkPendingPayment();
      setInterval(() => checkPendingPayment(), 10000);
      document.addEventListener('visibilitychange', function() { if (!document.hidden) { loadCharacterData(); checkPendingPayment(); } });
      document.getElementById('refresh-coins-btn').addEventListener('click', function() { checkCoinsBalance(true); });
    });

    window.addEventListener('beforeunload', function() { stopCoinsMonitoring(); if (updateInterval) clearInterval(updateInterval); });
  </script>
</body>
</html>
